name: Build & Deploy Extensions

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      generate_keystore:
        description: 'Generate and print a new keystore (run once only)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Gradle wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.6"

      - name: Make gradlew executable
        run: |
          gradle wrapper --gradle-version 8.6
          chmod +x gradlew

     - name: Decode keystore
        run: |
          if [ "${{ inputs.generate_keystore }}" = "true" ]; then
            keytool -genkey -v -keystore $GITHUB_WORKSPACE/signingkey.jks \
              -alias my-ext-key -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass mypassword123 -keypass mypassword123 \
              -dname "CN=Aniyomi, O=Extensions, C=US"
            echo "=== COPY THIS BASE64 OUTPUT INTO SIGNING_KEY SECRET ==="
            base64 $GITHUB_WORKSPACE/signingkey.jks
            echo "======================================================="
          elif [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > $GITHUB_WORKSPACE/signingkey.jks
          else
            keytool -genkey -v -keystore $GITHUB_WORKSPACE/signingkey.jks \
              -alias my-ext-key -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass mypassword123 -keypass mypassword123 \
              -dname "CN=Aniyomi, O=Extensions, C=US"
          fi

      - name: Build all extensions
        run: ./gradlew assembleRelease
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect APKs
        run: |
          mkdir -p output
          find . -path "*/outputs/apk/release/*.apk" -exec cp {} output/ \;
          ls -lh output/

      - name: Generate repo index
        run: python3 scripts/generate_index.py output/ > output/index.min.json

      - name: Upload APKs artifact
        uses: actions/upload-artifact@v4
        with:
          name: extensions-apks
          path: output/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output